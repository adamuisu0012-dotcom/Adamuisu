<!DOCTYPE html>
<html>
<head>
  <title>My First Website</title>
</head>

<body style="background:black; color:white; text-align:center;">

  <h1>🚀 My First Website</h1>
  <p>I built this with Vercel + GitHub</p>

  <h2>BTC Price: <span id="btc-price">Loading...</span></h2>

  <script>
    let change = 3;

    if (change > 2) {
      alert("⚡ Market moving fast!");
    }

    async function getBTCPrice() {
      const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
      const data = await response.json();
      document.getElementById('btc-price').innerText = "$" + data.bitcoin.usd;
    }

    getBTCPrice();
    setInterval(getBTCPrice, 10000);
  </script>

</body>
</html>
<button onclick="sayHi()">Click Me</button>

<script>
function sayHi() {
  alert("🔥 You are learning JavaScript!");
}
</script>
